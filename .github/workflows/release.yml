name: Publish release

on:
  push:
    branches:
      - main
    paths:
      - VERSION
      - .github/workflows/release.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Validate and package
        run: |
          make check
          sha256sum dist/i-have-adhd-and-47-tabs.zip > dist/SHA256SUMS

      - name: Read version
        id: version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must contain a semantic version such as 1.1.0" >&2
            exit 1
          fi
          test -f "docs/releases/$version.md"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: I Have ADHD and 47 Tabs ${{ steps.version.outputs.tag }}
          body_path: docs/releases/${{ steps.version.outputs.version }}.md
          make_latest: "true"
          fail_on_unmatched_files: true
          files: |
            dist/i-have-adhd-and-47-tabs.zip
            dist/SHA256SUMS
