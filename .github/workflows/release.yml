name: Publish release

on:
  push:
    branches:
      - main
    paths:
      - VERSION
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate and package
        run: |
          make check
          sha256sum dist/i-have-adhd-and-47-tabs.zip > dist/SHA256SUMS

      - name: Read version
        id: version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must contain a semantic version such as 1.1.0" >&2
            exit 1
          fi
          test -f "docs/releases/$version.md"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; nothing to do."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "I Have ADHD and 47 Tabs $VERSION"
          git push origin "$TAG"

          gh release create "$TAG" \
            dist/i-have-adhd-and-47-tabs.zip \
            dist/SHA256SUMS \
            --verify-tag \
            --title "I Have ADHD and 47 Tabs $TAG" \
            --notes-file "docs/releases/$VERSION.md"
