name: Validate skill

on:
  push:
    branches: [main]
    paths:
      - "i-have-adhd-and-47-tabs/**"
      - "scripts/**"
      - "tests/**"
      - "dist/**"
      - "docs/releases/**"
      - "assets/**"
      - "VERSION"
      - "CITATION.cff"
      - "CHANGELOG.md"
      - "README.md"
      - "SUPPORT.md"
      - "CONTRIBUTING.md"
      - "CODE_OF_CONDUCT.md"
      - "SECURITY.md"
      - "Makefile"
      - ".github/dependabot.yml"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/DISCUSSION_TEMPLATE/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "i-have-adhd-and-47-tabs/**"
      - "scripts/**"
      - "tests/**"
      - "dist/**"
      - "docs/releases/**"
      - "assets/**"
      - "VERSION"
      - "CITATION.cff"
      - "CHANGELOG.md"
      - "README.md"
      - "SUPPORT.md"
      - "CONTRIBUTING.md"
      - "CODE_OF_CONDUCT.md"
      - "SECURITY.md"
      - "Makefile"
      - ".github/dependabot.yml"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/DISCUSSION_TEMPLATE/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: make check
      - name: Verify committed package is current
        run: git diff --exit-code -- dist/i-have-adhd-and-47-tabs.zip
      - uses: actions/upload-artifact@v7
        if: matrix.python-version == '3.13'
        with:
          name: i-have-adhd-and-47-tabs
          path: dist/i-have-adhd-and-47-tabs.zip
