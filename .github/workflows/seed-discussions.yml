name: Seed community discussions

"on":
  push:
    branches:
      - main
    paths:
      - .github/workflows/seed-discussions.yml
      - .github/scripts/seed-discussions.js
  workflow_dispatch:

permissions:
  contents: read
  discussions: write

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create starter discussions
        uses: actions/github-script@v7
        with:
          script: |
            const seedDiscussions = require('./.github/scripts/seed-discussions.js');
            await seedDiscussions({ github, context, core });
