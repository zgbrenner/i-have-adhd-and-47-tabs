name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "tests/**"
      - ".github/scripts/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "scripts/**"
      - "tests/**"
      - ".github/scripts/**"
      - ".github/workflows/**"
  schedule:
    - cron: "23 7 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - python
          - javascript-typescript
          - actions
    steps:
      - uses: actions/checkout@v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
