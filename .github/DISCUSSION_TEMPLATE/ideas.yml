title: "[Idea] "
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the confusing, repetitive, or inaccessible experience.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would you change?
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example
      description: A short before-and-after example is especially useful.
